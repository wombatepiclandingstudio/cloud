# Standalone cold-launch flow: clears any prompt left on screen, relaunches the
# dev client from SpringBoard, waits for it to render a known state, then
# delegates prompt handling to settle-app.yaml.
appId: com.kilocode.kiloapp
---
- runFlow:
    when:
      visible: 'Ask App Not to Track'
    commands:
      - tapOn: 'Ask App Not to Track'
- runFlow:
    when:
      visible: 'This is the developer menu.*'
    commands:
      - tapOn: 'Continue'
- runFlow:
    when:
      visible: 'Fast Refresh|Element Inspector'
    commands:
      - tapOn: 'Close'
- stopApp
- runFlow:
    when:
      visible: 'Kilo'
    commands:
      - tapOn:
          text: 'Kilo'
# Cold launch and bundling are slow; wait for any known state before settling.
- extendedWaitUntil:
    visible: 'Open this page in "Kilo"\?|Allow “Kilo” to track your activity across other companies’ apps and websites\?|Ask App Not to Track|This is the developer menu.*|Fast Refresh|Element Inspector|“Kilo” Would Like to Send You Notifications|HOME|Home, tab, 1 of 4|Welcome to Kilo Code|Accept and continue'
    timeout: 30000
- runFlow: settle-app.yaml
