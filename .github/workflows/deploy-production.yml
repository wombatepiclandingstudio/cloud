name: Deploy to Production

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  VERCEL_VERSION: '53.3.1'
  VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}

jobs:
  check-production-db-startup:
    runs-on: ${{ vars.RUNNER_DEFAULT_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 15
    environment: production

    env:
      DATABASE_CA: ${{ secrets.DATABASE_CA }}
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}

    steps:
      - name: Checkout code
        uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b # v1
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check production DB startup path
        run: NODE_ENV=production pnpm exec tsx scripts/check-production-db-startup.ts

  run-migrations:
    runs-on: ${{ vars.RUNNER_DEFAULT_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 15
    environment: production

    env:
      DATABASE_CA: ${{ secrets.DATABASE_CA }}
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}

    steps:
      - name: Checkout code
        uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b # v1
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Drizzle migrations
        run: NODE_ENV=production pnpm run drizzle migrate

  stage-app:
    runs-on: ${{ vars.RUNNER_DEFAULT_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 30
    environment: production

    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}

    env:
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_APP }}

    steps:
      - name: Checkout code
        uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b # v1
        with:
          lfs: true

      - name: Install Vercel CLI
        run: npm install -g vercel@${{ env.VERCEL_VERSION }}

      - name: Stage Vercel deployment
        id: deploy
        run: |
          deployment_output=$(vercel deploy --prod --skip-domain --token=${{ secrets.VERCEL_TOKEN }})
          deployment_url=$(printf '%s\n' "$deployment_output" | tail -n 1)
          if [[ ! "$deployment_url" =~ ^https:// ]]; then
            echo "Vercel deploy did not print a deployment URL" >&2
            exit 1
          fi
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

  stage-global-app:
    runs-on: ${{ vars.RUNNER_DEFAULT_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 30
    environment: production

    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}

    env:
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_GLOBAL_APP }}

    steps:
      - name: Checkout code
        uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b # v1
        with:
          lfs: true

      - name: Install Vercel CLI
        run: npm install -g vercel@${{ env.VERCEL_VERSION }}

      - name: Stage Vercel deployment
        id: deploy
        run: |
          deployment_output=$(vercel deploy --prod --skip-domain --token=${{ secrets.VERCEL_TOKEN }})
          deployment_url=$(printf '%s\n' "$deployment_output" | tail -n 1)
          if [[ ! "$deployment_url" =~ ^https:// ]]; then
            echo "Vercel deploy did not print a deployment URL" >&2
            exit 1
          fi
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

  promote-app:
    runs-on: ${{ vars.RUNNER_DEFAULT_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 15
    needs: [stage-app, check-production-db-startup, run-migrations]
    environment: production

    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@${{ env.VERCEL_VERSION }}

      - name: Promote Vercel deployment
        run: vercel promote "${{ needs.stage-app.outputs.deployment_url }}" --scope=kilocode --token=${{ secrets.VERCEL_TOKEN }}

  promote-global-app:
    runs-on: ${{ vars.RUNNER_DEFAULT_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 15
    needs: [stage-global-app, check-production-db-startup, run-migrations]
    environment: production

    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@${{ env.VERCEL_VERSION }}

      - name: Promote Vercel deployment
        run: vercel promote "${{ needs.stage-global-app.outputs.deployment_url }}" --scope=kilocode --token=${{ secrets.VERCEL_TOKEN }}

  deploy-kiloclaw:
    needs: [check-production-db-startup, run-migrations]
    # Ceiling for the reusable workflow's GITHUB_TOKEN (a called workflow cannot
    # exceed the caller). The reusable workflow restricts further per job — only
    # its isolated attest-sbom job actually uses id-token/attestations.
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/deploy-kiloclaw.yml
    secrets: inherit
